name: PM Support Release Info

on:
  workflow_dispatch:
    inputs:
      provider:
        description: "Upstream provider to inspect"
        required: true
        default: "both"
        type: choice
        options:
          - both
          - platformio
          - pioarduino
      tag:
        description: "Release tag to inspect, or latest"
        required: false
        default: "latest"
        type: string
  schedule:
    - cron: "17 4 * * *"

defaults:
  run:
    shell: bash

jobs:
  resolve:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        provider: [platformio, pioarduino]
    if: github.event_name == 'schedule' || inputs.provider == 'both' || inputs.provider == matrix.provider
    steps:
      - name: Checkout PM support branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Resolve release metadata
        id: resolve
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p dist/pm-support
          python3 tools/pm-support-release-info.py \
            --provider "${{ matrix.provider }}" \
            --tag "${{ inputs.tag || 'latest' }}" \
            --output "dist/pm-support/${{ matrix.provider }}.json"

      - name: Upload release manifest
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: pm-support-${{ matrix.provider }}-${{ steps.resolve.outputs.platform_version }}-arduino-${{ steps.resolve.outputs.arduino_core }}
          path: dist/pm-support/${{ matrix.provider }}.json
